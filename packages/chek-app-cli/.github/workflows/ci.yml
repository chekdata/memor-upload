name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest tests -q

      - name: Check OpenAPI registry drift
        env:
          CHEK_BACKEND_SAAS_OPENAPI: ${{ secrets.CHEK_BACKEND_SAAS_OPENAPI }}
        run: python scripts/check_registry_drift.py --allow-missing-optional
